assName\":\"mx-auto max-w-3xl px-4 py-8\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"mb-1 text-2xl font-bold text-ink\",\"children\":\"高中十二年级\"}],[\"$\",\"p\",null,{\"className\":\"mb-6 text-sm text-zinc-500\",\"children\":[\"共 \",4,\" 首，\",4,\" 首必背\"]}],[\"$\",\"$L1c\",null,{\"poems\":[{\"id\":\"pi-pa-xing\",\"title\":\"琵琶行（节选）\",\"author\":\"白居易\",\"dynasty\":\"唐代\",\"type\":\"诗\",\"grade\":12,\"semester\":1,\"text\":[\"浔阳江头夜送客，枫叶荻花秋瑟瑟。\",\"主人下马客在船，举酒欲饮无管弦。\",\"醉不成欢惨将别，别时茫茫江浸月。\",\"忽闻水上琵琶声，主人忘归客不发。\",\"千呼万唤始出来，犹抱琵琶半遮面。\",\"转轴拨弦三两声，未成曲调先有情。\",\"大弦嘈嘈如急雨，小弦切切如私语。\",\"嘈嘈切切错杂弹，大珠小珠落玉盘。\"],\"annotations\":[{\"term\":\"瑟瑟\",\"explanation\":\"风吹草木声\"},{\"term\":\"管弦\",\"explanation\":\"音乐\"},{\"term\":\"嘈嘈\",\"explanation\":\"形容声音粗重\"},{\"term\":\"切切\",\"explanation\":\"形容声音轻细\"}],\"translation\":\"夜晚在浔阳江头送别客人，枫叶和荻花在秋风中瑟瑟作响。主人下马客人上了船，举杯欲饮却没有音乐相伴。醉不成欢将分别，分别时江面倒映着茫茫月色。忽然听到江上传来的琵琶声，主人忘记归去客人也不开船。千呼万唤她才出来，还抱着琵琶半遮着脸。转轴拨弦弹了三两声，还没成曲调先有了情意。大弦嘈嘈如同急雨，小弦切切如同私语。嘈嘈切切交错弹奏，就像大珠小珠落入玉盘。\",\"isRequired\":true,\"keywords\":[\"音乐\",\"感怀\"]},{\"id\":\"chi-bi-fu\",\"title\":\"赤壁赋（节选）\",\"author\":\"苏轼\",\"dynasty\":\"宋代\",\"type\":\"古文\",\"grade\":12,\"semester\":1,\"text\":[\"壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。\",\"清风徐来，水波不兴。\",\"举酒属客，诵明月之诗，歌窈窕之章。\",\"少焉，月出于东山之上，徘徊于斗牛之间。\",\"白露横江，水光接天。\",\"纵一苇之所如，凌万顷之茫然。\",\"浩浩乎如冯虚御风，而不知其所止；\",\"飘飘乎如遗世独立，羽化而登仙。\"],\"annotations\":[{\"term\":\"既望\",\"explanation\":\"农历十六日\"},{\"term\":\"属\",\"explanation\":\"劝酒\"},{\"term\":\"斗牛\",\"explanation\":\"斗宿和牛宿，星宿名\"},{\"term\":\"冯虚御风\",\"explanation\":\"凌空驾风\"},{\"term\":\"羽化\",\"explanation\":\"成仙\"}],\"translation\":\"壬戌年的秋天，七月十六日，我和客人乘船在赤壁下游玩。清风轻轻吹来，水面波澜不起。举杯劝客人饮酒，朗诵明月的诗篇。不一会儿，月亮从东山上升起，在斗宿和牛宿之间徘徊。白茫茫的雾气横在江上，水光与天相接。任凭小船漂去，越过茫茫无际的江面。浩浩荡荡就像凌空驾风，不知道要飞到哪里去；飘飘然好像脱离了尘世，变成神仙飞入仙境。\",\"isRequired\":true,\"keywords\":[\"赤壁\",\"哲理\",\"逍遥\"]},{\"id\":\"guan-ju\",\"title\":\"关雎\",\"author\":\"佚名\",\"dynasty\":\"先秦\",\"type\":\"诗\",\"grade\":12,\"semester\":1,\"text\":[\"关关雎鸠，在河之洲。\",\"窈窕淑女，君子好逑。\",\"参差荇菜，左右流之。\",\"窈窕淑女，寤寐求之。\",\"求之不得，寤寐思服。\",\"悠哉悠哉，辗转反侧。\",\"参差荇菜，左右采之。\",\"窈窕淑女，琴瑟友之。\",\"参差荇菜，左右芼之。\",\"窈窕淑女，钟鼓乐之。\"],\"annotations\":[{\"term\":\"雎鸠\",\"explanation\":\"水鸟\"},{\"term\":\"窈窕\",\"explanation\":\"体态美好的样子\"},{\"term\":\"好逑\",\"explanation\":\"好的配偶\"},{\"term\":\"寤寐\",\"explanation\":\"日日夜夜\"},{\"term\":\"芼\",\"explanation\":\"挑选\"}],\"translation\":\"关关叫的雎鸠，在河中小洲上。美丽贤淑的女子，是君子好的配偶。长短不齐的荇菜，左右采摘。美丽贤淑的女子，日夜追求。追求不到，日夜思念。思念深长啊，翻来覆去睡不着。长短不齐的荇菜，左右采撷。美丽贤淑的女子，弹琴鼓瑟亲近她。长短不齐的荇菜，左右挑选。美丽贤淑的女子，敲钟击鼓使她快乐。\",\"isRequired\":true,\"keywords\":[\"爱情\",\"诗经\"]},{\"id\":\"jian-jia\",\"title\":\"蒹葭\",\"author\":\"佚名\",\"dynasty\":\"先秦\",\"type\":\"诗\",\"grade\":12,\"semester\":1,\"text\":[\"蒹葭苍苍，白露为霜。\",\"所谓伊人，在水一方。\",\"溯洄从之，道阻且长。\",\"溯游从之，宛在水中央。\",\"蒹葭萋萋，白露未晞。\",\"所谓伊人，在水之湄。\",\"溯洄从之，道阻且跻。\",\"溯游从之，宛在水中坻。\"],\"annotations\":[{\"term\":\"蒹葭\",\"explanation\":\"芦苇\"},{\"term\":\"伊人\",\"explanation\":\"那个人\"},{\"term\":\"溯洄\",\"explanation\":\"逆流而上\"},{\"term\":\"晞\",\"explanation\":\"干\"},{\"term\":\"湄\",\"explanation\":\"水边\"},{\"term\":\"坻\",\"explanation\":\"水中小洲\"}],\"translation\":\"芦苇苍翠，白露凝结成霜。我思念的人，在河水的那一边。逆流去寻找，道路险阻漫长。顺流去寻找，仿佛就在水中央。芦苇茂盛，白露还未干。我思念的人，在河边水岸上。逆流去寻找，道路险阻难登。顺流去寻找，仿佛就在水中小洲上。\",\"isRequired\":true,\"keywords\":[\"诗经\",\"爱情\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"1d:I[27201,[\"/poetry/_next/static/chunks/13h-0fd.p-1ga.js\",\"/poetry/_next/static/chunks/0d3shmwh5_nmn.js\"],\"IconMark\"]\n16:null\n1b:[[\"$\",\"title\",\"0\",{\"children\":\"古诗文学习\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"中国中小学生必备古诗文学习平台，覆盖一至高三部编版必背古诗文。\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/poetry/favicon.ico?favicon.0x3dzn~oxb6tn.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"$L1d\",\"3\",{}]]\n"])</script></body></html>
