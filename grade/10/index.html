h([1,"13:[\"$\",\"div\",null,{\"className\":\"mx-auto max-w-3xl px-4 py-8\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"mb-1 text-2xl font-bold text-ink\",\"children\":\"高中十年级\"}],[\"$\",\"p\",null,{\"className\":\"mb-6 text-sm text-zinc-500\",\"children\":[\"共 \",4,\" 首，\",4,\" 首必背\"]}],[\"$\",\"$L1c\",null,{\"poems\":[{\"id\":\"duan-ge-xing\",\"title\":\"短歌行\",\"author\":\"曹操\",\"dynasty\":\"两汉\",\"type\":\"诗\",\"grade\":10,\"semester\":1,\"text\":[\"对酒当歌，人生几何！\",\"譬如朝露，去日苦多。\",\"慨当以慷，忧思难忘。\",\"何以解忧？唯有杜康。\",\"青青子衿，悠悠我心。\",\"但为君故，沉吟至今。\",\"呦呦鹿鸣，食野之苹。\",\"我有嘉宾，鼓瑟吹笙。\",\"明明如月，何时可掇？\",\"忧从中来，不可断绝。\",\"越陌度阡，枉用相存。\",\"契阔谈讌，心念旧恩。\",\"月明星稀，乌鹊南飞。\",\"绕树三匝，何枝可依？\",\"山不厌高，海不厌深。\",\"周公吐哺，天下归心。\"],\"annotations\":[{\"term\":\"几何\",\"explanation\":\"多少\"},{\"term\":\"杜康\",\"explanation\":\"指酒\"},{\"term\":\"青青子衿\",\"explanation\":\"指贤才\"},{\"term\":\"契阔\",\"explanation\":\"聚散\"},{\"term\":\"吐哺\",\"explanation\":\"吐出口中的食物\"}],\"translation\":\"面对美酒应该高歌，人生能有多长？就像早晨的露水，逝去的时光太多。慷慨激昂，忧思难忘。用什么解忧？只有美酒。穿着青领衣服的学子，深深牵动我的心。为了你们的缘故，我沉吟至今。鹿群呦呦地叫着，在吃野地里的艾蒿。我有尊贵的客人，奏起瑟和笙来欢迎。明月何时可以摘取？忧思从中而来，不可断绝。客人穿过田间小路，屈驾前来探望。久别重逢谈心宴饮，心中念着旧日的情谊。月明星稀，乌鹊向南飞去。绕树飞了三周，哪个树枝可以栖息？山不嫌高，海不嫌深。像周公那样礼贤下士，天下人心就会归附。\",\"isRequired\":true,\"keywords\":[\"求贤\",\"壮志\"]},{\"id\":\"deng-gao\",\"title\":\"登高\",\"author\":\"杜甫\",\"dynasty\":\"唐代\",\"type\":\"诗\",\"grade\":10,\"semester\":1,\"text\":[\"风急天高猿啸哀，渚清沙白鸟飞回。\",\"无边落木萧萧下，不尽长江滚滚来。\",\"万里悲秋常作客，百年多病独登台。\",\"艰难苦恨繁霜鬓，潦倒新停浊酒杯。\"],\"annotations\":[{\"term\":\"渚\",\"explanation\":\"水中小洲\"},{\"term\":\"落木\",\"explanation\":\"落叶\"},{\"term\":\"萧萧\",\"explanation\":\"风吹落叶的声音\"},{\"term\":\"百年\",\"explanation\":\"指一生\"}],\"translation\":\"风急天高猿猴哀啸，水清沙白鸟儿盘旋。无边无际的落叶纷纷飘下，望不到头的长江滚滚而来。万里漂泊悲秋常客，一生多病独自登台。艰难困苦使白发增多，潦倒病休刚刚停了酒。\",\"isRequired\":true,\"keywords\":[\"悲秋\",\"登临\"]},{\"id\":\"gui-yuan-tian-ju\",\"title\":\"归园田居（其一）\",\"author\":\"陶渊明\",\"dynasty\":\"魏晋\",\"type\":\"诗\",\"grade\":10,\"semester\":1,\"text\":[\"少无适俗韵，性本爱丘山。\",\"误落尘网中，一去三十年。\",\"羁鸟恋旧林，池鱼思故渊。\",\"开荒南野际，守拙归园田。\",\"方宅十余亩，草屋八九间。\",\"榆柳荫后檐，桃李罗堂前。\",\"暧暧远人村，依依墟里烟。\",\"狗吠深巷中，鸡鸣桑树颠。\",\"户庭无尘杂，虚室有余闲。\",\"久在樊笼里，复得返自然。\"],\"annotations\":[{\"term\":\"适俗韵\",\"explanation\":\"适应世俗的气质\"},{\"term\":\"尘网\",\"explanation\":\"官场\"},{\"term\":\"羁鸟\",\"explanation\":\"笼中鸟\"},{\"term\":\"守拙\",\"explanation\":\"保持质朴\"},{\"term\":\"樊笼\",\"explanation\":\"牢笼\"}],\"translation\":\"从小没有适应世俗的气质，生来就喜爱山水。误落官场罗网，一去三十年。笼中鸟眷恋旧林，池中鱼思念故渊。在南野开荒，守拙归隐田园。住宅周围十余亩，草屋八九间。榆柳遮蔽后檐，桃李排列堂前。远处的村庄隐约可见，炊烟袅袅升起。狗在深巷中叫，鸡在桑树上鸣。庭院没有尘杂，空室中有余闲。久在牢笼里，终于又返回自然。\",\"isRequired\":true,\"keywords\":[\"田园\",\"归隐\"]},{\"id\":\"meng-you-tian-lao-yin-liu-bie\",\"title\":\"梦游天姥吟留别（节选）\",\"author\":\"李白\",\"dynasty\":\"唐代\",\"type\":\"诗\",\"grade\":10,\"semester\":1,\"text\":[\"海客谈瀛洲，烟涛微茫信难求。\",\"越人语天姥，云霞明灭或可睹。\",\"天姥连天向天横，势拔五岳掩赤城。\",\"天台四万八千丈，对此欲倒东南倾。\",\"世间行乐亦如此，古来万事东流水。\",\"别君去兮何时还？\",\"且放白鹿青崖间，须行即骑访名山。\",\"安能摧眉折腰事权贵，使我不得开心颜！\"],\"annotations\":[{\"term\":\"瀛洲\",\"explanation\":\"传说中的仙山\"},{\"term\":\"信\",\"explanation\":\"确实\"},{\"term\":\"拔\",\"explanation\":\"超出\"},{\"term\":\"摧眉折腰\",\"explanation\":\"低头弯腰\"}],\"translation\":\"海上客谈起瀛洲，烟波渺茫确实难寻。越人说起天姥山，云霞明灭中或可看见。天姥山连天横亘，气势超出五岳遮蔽赤城。天台山四万八千丈，对着天姥山也好像要倾倒。世间行乐也像这样，古来万事如东流水。告别你们何时回来？暂且放养白鹿在青崖间，想走时就骑着去访名山。怎么能低头弯腰侍奉权贵，使我不能开心展颜！\",\"isRequired\":true,\"keywords\":[\"游仙\",\"傲骨\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"1d:I[27201,[\"/poetry/_next/static/chunks/13h-0fd.p-1ga.js\",\"/poetry/_next/static/chunks/0d3shmwh5_nmn.js\"],\"IconMark\"]\n16:null\n1b:[[\"$\",\"title\",\"0\",{\"children\":\"古诗文学习\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"中国中小学生必备古诗文学习平台，覆盖一至高三部编版必背古诗文。\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/poetry/favicon.ico?favicon.0x3dzn~oxb6tn.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"$L1d\",\"3\",{}]]\n"])</script></bo
